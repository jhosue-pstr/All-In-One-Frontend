services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jpastor
      POSTGRES_PASSWORD: "123"
      POSTGRES_DB: ALL-IN-ONE-DB
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jpastor -d ALL-IN-ONE-DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: all-in-one-backend:latest
    environment:
      DATABASE_URL: postgresql://jpastor:123@db:5432/ALL-IN-ONE-DB
      SECRET_KEY: super-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    image: all-in-one-frontend:latest
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    networks:
      - app-network

networks:
  app-network:
    external: true
